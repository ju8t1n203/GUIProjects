<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GUI Development</title>
    <link rel="stylesheet" type="text/css" href="Styles.css">
  </head>

  <body>
    <div id="mode" style="margin-bottom: 10px;">
      <input type="radio" id="add" name="actionMode" value="add" checked>
      <label for="add">Add</label>
      <input type="radio" id="delete" name="actionMode" value="delete">
      <label for="delete">Delete</label>
    </div>

    <div id="root" class="level">
      <div class="node">
        <div class="connector">
          <div class="input-group">
            <input type="text" class="typical-text-site" placeholder="Site Name">
          </div>
          <button class="typical-btn-room">Add Room</button>
        </div>
      </div>
      <!-- additional sibling nodes will be appended here -->
    </div>
  </body>

  <script src="utils.js"></script>
  <script src="ChildBuilder.js"></script>
  <script src="SiblingBuilder.js"></script>
  <script src="BranchBuilder.js"></script>
  <script src="deleteLocation.js"></script>
  
</html>
